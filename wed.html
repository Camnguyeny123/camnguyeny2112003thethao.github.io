<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Pro - Tin tức & Kết quả</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">FOOTBALL<span>PRO</span></div>
        <nav>
            <ul>
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Giải đấu</a></li>
                <li><a href="#">Lịch thi đấu</a></li>
                <li><a href="#">Tin tức</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Đam Mê Bất Tận</h1>
            <p>Cập nhật kết quả bóng đá nhanh và chính xác nhất.</p>
            <a href="#" class="btn">Xem ngay</a>
        </div>
    </section>

    <section class="matches">
        <h2>Trận đấu tiêu điểm</h2>
        <div class="match-card">
            <div class="team">
                <img src="https://via.placeholder.com/50" alt="Team 1">
                <span>Real Madrid</span>
            </div>
            <div class="score">2 - 1</div>
            <div class="team">
                <span>Barcelona</span>
                <img src="https://via.placeholder.com/50" alt="Team 2">
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Football Pro. Thiết kế bởi Gemini.</p>
    </footer>

</body>
</html>
